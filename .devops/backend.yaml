services:
  profile:
    build:
      context: ../services/profile-service
      dockerfile: Dockerfile
    env_file:
      - ../services/profile-service/.env
      
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ../services/profile-service/src:/opt/services/profile-service/src
      - ../services/profile-service/entrypoint.sh:/opt/services/profile-service/entrypoint.sh
      - ../services/profile-service/src/infrastructure/migrations:/opt/services/profile-service/src/infrastructure/migrations


  db:
    container_name: postgres_db
    image: postgis/postgis:16-3.4
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data 
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql


  redis:
    container_name: redis_db
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:4.1-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: $RABBITMQ_USER
      RABBITMQ_DEFAULT_PASS: $RABBITMQ_PASS
    ports:
      - "5672:5672"
      - "15672:15672"

networks:
  default:
    driver: bridge

volumes:
  postgres_data: 
